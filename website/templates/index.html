<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Infinite Grid Map</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
	<div id="map" aria-label="Infinite draggable grid">
		<div id="world" aria-hidden="true">
            <div id="center-homeMarker" aria-hidden="true">
                <span class="center-homeMarker-label">Home Marker</span>
            </div>
		</div>
	</div>
	<!-- Crosshair overlay (styled as a +, 2 grid cells in size, always centered) -->
	<div id="crosshair" aria-hidden="true"></div>
	<div class="home-popup">
		<button id="homeButton"><i class="fa-solid fa-house"></i></button>	
	</div>

	<!-- Debug panel -->
	<div class="debug-panel">
		   <div class="debug-header" id="debugHeader">
			   <span>Debug</span>
			   <button id="debugDropdownBtn" title="Show debug options" aria-label="Show debug options"><i class="fa-solid fa-caret-down"></i></button>
		   </div>
		<div class="debug-dropdown" id="debugDropdown">
			<label class="debug-checkbox"><input type="checkbox" id="toggleCrosshair" checked><span>Show crosshair</span></label><br>
			<label class="debug-checkbox"><input type="checkbox" id="toggleHomeMarker" checked><span>Show center HomeMarker</span></label><br>
			<label class="debug-checkbox"><input type="checkbox" id="toggleGrid" checked><span>Show grid</span></label><br>
			<button id="addReceiptBtn" class="debug-button">Add Receipt</button><br>
			<div class="debug-coords">Coordinates: <span id="debugCoords">(0, 0)</span></div>
		</div>
	</div>

	<script type="module" src="/static/js/main.js"></script>
</body>
</html>
